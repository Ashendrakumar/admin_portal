<header class="topbar">
  <div class="topbar__left">
    <button class="btn btn-ghost btn-icon hide-desktop" (click)="toggle()">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <div class="topbar__breadcrumb">
      <span class="topbar__app">Secure Admin Portal</span>
    </div>
  </div>
  <div class="topbar__right">
    @if (authState.user(); as user) {
      <div class="topbar__status">
        <span class="status-dot"></span>
        <span class="status-text">Live</span>
      </div>
      <div class="topbar__user">
        <img
          [src]="'https://ui-avatars.com/api/?name=' + user.first_name"
          [alt]="user.first_name"
          class="avatar"
        />
        <span class="hide-mobile">{{ user.first_name }}</span>
      </div>
    }
    <button class="btn btn-secondary" (click)="onLogout()">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      <span class="hide-mobile">Log Out</span>
    </button>
  </div>
</header>
